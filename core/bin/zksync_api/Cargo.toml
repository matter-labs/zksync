[package]
name = "zksync_api"
version = "1.0.0"
edition = "2021" # Daha iyi bellek yönetimi ve hız için 2021 edition'a yükseltildi
authors = ["The Matter Labs Team <hello@matterlabs.dev>"]
homepage = "https://zksync.io/"
repository = "https://github.com/matter-labs/zksync"
license = "Apache-2.0"
keywords = ["blockchain", "zksync", "layer2", "ethereum"]
categories = ["cryptography", "web-programming::http-server"]
publish = false

[profile.release]
opt-level = 3        # Maksimum hız için seviye 3 optimizasyon
lto = "thin"         # Link-Time Optimization (Binary boyutunu küçültür, performansı artırır)
codegen-units = 1    # Daha yavaş derleme ama daha optimize binary
panic = "abort"      # Binary boyutunu küçültür ve saldırı yüzeyini azaltır

[features]
default = []
api_test = []

[dependencies]
# Zksync Dahili Kütüphaneler (Versionlar senkronize edildi)
zksync_types = { path = "../../lib/types", version = "1.0" }
zksync_storage = { path = "../../lib/storage", version = "1.0" }
zksync_token_db_cache = { path = "../../lib/token_db_cache", version = "1.0" }
zksync_crypto = { path = "../../lib/crypto", version = "1.0" }
zksync_mempool = { path = "../../lib/mempool", version = "1.0" }
zksync_config = { path = "../../lib/config", version = "1.0" }
zksync_utils = { path = "../../lib/utils", version = "1.0" }
zksync_contracts = { path = "../../lib/contracts", version = "1.0" }
zksync_eth_client = { path = "../../lib/eth_client", version = "1.0" }
zksync_eth_signer = { path = "../../lib/eth_signer", version = "1.0" }
zksync_api_client = { path = "../../lib/api_client", version = "0.1" }
zksync_api_types = { path = "../../lib/api_types", version = "1.0" }
zksync_prometheus_exporter = { path = "../../lib/prometheus_exporter", version = "1.0" }
zksync_balancer = { path = "../../lib/balancer", version = "1.0" }
zksync_gateway_watcher = { path = "../../lib/gateway_watcher", version = "1.0" }
vlog = { path = "../../lib/vlog", version = "1.0" }

# Serialization & Veri Tipleri (Güvenlik yamaları içeren versiyonlar)
serde = { version = "1.0.130", features = ["derive"] }
serde_json = "1.0.72"
serde_repr = "0.1.7"
hex = "0.4.3"
chrono = { version = "0.4.19", features = ["serde"] }
num = { version = "0.4", features = ["serde"] }
bigdecimal = { version = "0.3", features = ["serde"]} # Performans için 0.3'e yükseltildi

# Blockchain & Network (Kritik güncellemeler)
ethabi = "16.0.0"
web3 = "0.18.0"
tiny-keccak = { version = "2.0.2", features = ["keccak"] } # Daha güvenli v2

# JSON-RPC Framework (API Kararlılığı)
jsonrpc-core = "18.0"
jsonrpc-core-client = { version = "18.0", features = ["ws", "http"] }
jsonrpc-pubsub = "18.0"
jsonrpc-ws-server = "18.0"
jsonrpc-http-server = "18.0"
jsonrpc-derive = "18.0"

# Async & HTTP Server (Modern Rust yapısı)
tokio = { version = "1.14", features = ["full"] }
futures = { version = "0.3.17", features = ["compat"] }
hyper = { version = "0.14.14", features = ["full"] }
reqwest = { version = "0.11.6", features = ["json", "rustls-tls"] } # OpenSSL yerine daha güvenli Rustls

# Actix Framework (Web Katmanı)
actix-rt = "2.5"
actix-cors = "0.6"
actix-web = "4.0"
actix-web-httpauth = "0.6"

# Yardımcı Araçlar
anyhow = "1.0.45"
thiserror = "1.0.30"
itertools = "0.10"
lru-cache = "0.1.2"
once_cell = "1.8"
regex = "1.5"
structopt = "0.3.25"
ctrlc = { version = "3.2", features = ["termination"] }
jsonwebtoken = "8.0" # Güvenlik için v8'e yükseltildi
metrics = "0.17"
async-trait = "0.1.51"
qstring = "0.7.2"

[dev-dependencies]
zksync_test_account = { path = "../../tests/test_account" }
criterion = { version = "0.3.5", features = ["async_tokio", "async_futures"] }
actix-test = "0.1"

[[bench]]
name = "api_service"
harness = false
path = "benches/criterion/lib.rs"
