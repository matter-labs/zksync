[package]
name = "zksync_l1_event_listener"
version = "1.0.0"
edition = "2024"

[dependencies]
vlog = { path = "../../lib/vlog", version = "1.0" }


web3 = "0.18.0"
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.0"
anyhow = "1.0"
